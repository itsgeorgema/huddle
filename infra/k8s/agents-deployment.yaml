apiVersion: apps/v1
kind: Deployment
metadata:
  name: huddle-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huddle-agents
  template:
    metadata:
      labels:
        app: huddle-agents
    spec:
      containers:
        - name: agents
          image: huddle-agents:latest
          ports:
            - containerPort: 8001
