apiVersion: apps/v1
kind: Deployment
metadata:
  name: huddle-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: huddle-api
  template:
    metadata:
      labels:
        app: huddle-api
    spec:
      containers:
        - name: api
          image: huddle-api:latest
          ports:
            - containerPort: 8000
